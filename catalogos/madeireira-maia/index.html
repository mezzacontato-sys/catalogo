<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Madeiraria Safra - Catalogo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#fff;color:#111;-webkit-tap-highlight-color:transparent}
#header{background:#fff;padding:0 1.25rem;position:sticky;top:0;z-index:100;border-bottom:1px solid #eee}
#header-top{display:flex;align-items:center;justify-content:space-between;height:60px}
#logo-wrap{display:flex;align-items:center;gap:10px;max-width:65%}
#logo-img{max-height:44px;max-width:160px;object-fit:contain;display:none}
#logo-txt{font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase}
#search-btn{background:none;border:none;cursor:pointer;padding:6px;display:flex;align-items:center;color:#111;flex-shrink:0}
#search-btn svg{width:20px;height:20px}
#search-bar{max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease}
#search-bar.open{max-height:60px;padding-bottom:10px}
#search-wrap{position:relative}
#search{width:100%;padding:10px 36px 10px 14px;border:1.5px solid #111;font-family:'Inter',sans-serif;font-size:14px;background:#fff;color:#111;outline:none}
#clear-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:20px;color:#999;display:none;line-height:1}
#clear-btn.show{display:block}
#suggestions{position:absolute;top:calc(100% + 2px);left:0;right:0;background:#fff;border:1.5px solid #111;border-top:none;z-index:200;display:none}
.sug-item{padding:10px 14px;font-size:13px;font-weight:500;cursor:pointer;color:#111;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.sug-item:last-child{border-bottom:none}
.sug-item:hover{background:#f5f5f5}
.sug-cat{font-size:11px;font-weight:400;color:#aaa;text-transform:uppercase;letter-spacing:.05em}
.sug-hi{text-decoration:underline;text-underline-offset:2px}
#filters{display:flex;gap:6px;overflow-x:auto;padding:10px 0 12px;scrollbar-width:none}
#filters::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border:1.5px solid #ddd;border-radius:100px;font-family:'Inter',sans-serif;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#888;background:#fff;cursor:pointer;transition:all .18s}
.chip:hover{border-color:#111;color:#111}
.chip.active{background:#111;border-color:#111;color:#fff}
#subcats{display:none;gap:6px;flex-wrap:wrap;padding:0 1.25rem 10px;border-bottom:1px solid #eee}
.sub-chip{padding:5px 12px;border:1.5px solid #ddd;border-radius:100px;font-family:'Inter',sans-serif;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#999;background:#fff;cursor:pointer;transition:all .18s}
.sub-chip:hover{border-color:#555;color:#555}
.sub-chip.active{background:#111;border-color:#111;color:#fff}
#rbar{display:flex;align-items:center;justify-content:space-between;padding:8px 1.25rem;border-bottom:1px solid #eee}
#count{font-size:11px;font-weight:500;color:#aaa;letter-spacing:.06em;text-transform:uppercase}
#sort-sel{font-family:'Inter',sans-serif;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#666;border:none;background:none;cursor:pointer;outline:none}
#grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2px;background:#eee;padding-bottom:90px}
@media(min-width:900px){#grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1200px){#grid{grid-template-columns:repeat(4,1fr)}}
.card{position:relative;background:#fff;cursor:pointer;overflow:hidden;aspect-ratio:1/1;display:flex;flex-direction:column;opacity:0;transform:translateY(14px);transition:opacity .4s ease,transform .4s ease}
.card.visible{opacity:1;transform:translateY(0)}
.card-img-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:1rem .75rem .5rem;overflow:hidden}
.card-img{max-width:100%;max-height:100%;object-fit:contain;display:block;transition:transform .5s cubic-bezier(.25,.46,.45,.94)}
.card:hover .card-img{transform:scale(1.05)}
.card-info{padding:.45rem .75rem .65rem;background:#fff}
.card-sub-label{font-size:10px;font-weight:500;color:#aaa;letter-spacing:.07em;text-transform:uppercase;margin-bottom:2px}
.card-title{font-size:12px;font-weight:700;color:#111;letter-spacing:.03em;text-transform:uppercase;line-height:1.3}
.card-add{position:absolute;bottom:52px;right:8px;width:30px;height:30px;border-radius:50%;background:#111;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.8);transition:opacity .2s,transform .2s;z-index:2}
.card-add svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round}
.card:hover .card-add{opacity:1;transform:scale(1)}
@media(hover:none){.card-add{opacity:1;transform:scale(1)}}
.card-add.added{background:#2a7a2a}
#cart-fab{position:fixed;bottom:24px;right:20px;z-index:200;display:none}
#cart-fab.show{display:block}
#cart-btn{width:56px;height:56px;border-radius:50%;background:#111;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.3);position:relative}
#cart-btn svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#cart-count{position:absolute;top:-4px;right:-4px;background:#c0392b;color:#fff;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center}
#cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;display:none;align-items:flex-end;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
#cart-overlay.open{display:flex}
#cart-drawer{background:#fff;width:100%;max-height:70vh;overflow-y:auto;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);border-radius:16px 16px 0 0}
#cart-overlay.open #cart-drawer{transform:translateY(0)}
@media(min-width:640px){#cart-overlay{align-items:center;justify-content:center}#cart-drawer{width:420px;max-height:80vh;border-radius:8px;transform:scale(.96)}#cart-overlay.open #cart-drawer{transform:scale(1)}}
#cart-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid #eee;position:sticky;top:0;background:#fff}
#cart-title{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
#cart-close{background:none;border:none;font-size:24px;cursor:pointer;color:#111;line-height:1}
#cart-items{padding:.5rem 0}
.cart-item{display:flex;align-items:center;gap:.85rem;padding:.75rem 1.25rem;border-bottom:1px solid #f0f0f0}
.cart-item-img{width:48px;height:48px;object-fit:contain;background:#f8f7f5;flex-shrink:0;border-radius:2px}
.cart-item-info{flex:1;min-width:0}
.cart-item-cat{font-size:10px;font-weight:500;color:#aaa;text-transform:uppercase;letter-spacing:.06em}
.cart-item-name{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;line-height:1.3;margin-top:1px}
.cart-item-remove{background:none;border:none;cursor:pointer;color:#ccc;font-size:20px;flex-shrink:0;padding:4px;line-height:1;transition:color .15s}
.cart-item-remove:hover{color:#c0392b}
#cart-empty-msg{padding:2.5rem;text-align:center;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#ccc}
#cart-footer{padding:1rem 1.25rem;position:sticky;bottom:0;background:#fff;border-top:1px solid #eee}
#cart-wpp-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;background:#25d366;color:#fff;border:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .2s}
#cart-wpp-btn:hover{background:#1ebe5d}
#cart-wpp-btn svg{width:20px;height:20px;fill:#fff;flex-shrink:0}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:flex-end;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
#overlay.open{display:flex}
#modal{background:#fff;width:100%;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
#overlay.open #modal{transform:translateY(0)}
@media(min-width:640px){#overlay{align-items:center;justify-content:center}#modal{width:460px;max-height:88vh;transform:scale(.97)}#overlay.open #modal{transform:scale(1)}}
#modal-top{position:sticky;top:0;background:#fff;display:flex;justify-content:space-between;align-items:center;padding:.9rem 1.25rem;border-bottom:1px solid #eee;z-index:10}
#modal-cats{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#aaa}
#modal-close{background:none;border:none;font-size:26px;cursor:pointer;color:#111;line-height:1;padding:0}
#modal-img-wrap{background:#fff;display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem;min-height:280px}
#modal-img{max-height:320px;max-width:100%;object-fit:contain}
#modal-body{padding:1.4rem 1.25rem 0}
#modal-name{font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;line-height:1.35;margin-bottom:.85rem}
#modal-desc{font-size:14px;line-height:1.8;color:#555}
#modal-un{margin-top:.65rem;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#bbb}
#modal-actions{display:flex;flex-direction:column;gap:10px;margin:1.4rem 1.25rem 1.5rem}
#modal-add-cart{padding:15px;background:#fff;color:#111;border:1.5px solid #111;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:background .2s,color .2s}
#modal-add-cart:hover{background:#111;color:#fff}
#modal-add-cart.added{background:#2a7a2a;border-color:#2a7a2a;color:#fff}
#modal-cta{display:block;padding:15px;background:#111;color:#fff;text-align:center;text-decoration:none;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;transition:opacity .2s}
#modal-cta:hover{opacity:.85}
#empty{display:none;text-align:center;padding:5rem 2rem}
#empty p{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#ccc;margin-bottom:1.25rem}
#empty-reset{padding:12px 24px;background:#111;color:#fff;border:none;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}

/* ── BANNER ── */
#banner{
  background:#111;color:#fff;
  text-align:center;padding:9px 1rem;
  font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
}
#banner span{opacity:.6;margin:0 12px}

/* ── WPP FLOAT ── */
#wpp-float{
  position:fixed;bottom:24px;right:88px;z-index:200;
  display:flex;align-items:center;gap:10px;
}
#wpp-float-btn{
  width:56px;height:56px;border-radius:50%;
  background:#25d366;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(37,211,102,.4);
  transition:transform .2s,background .2s;
}
#wpp-float-btn:hover{transform:scale(1.08);background:#1ebe5d}
#wpp-float-btn svg{width:28px;height:28px;fill:#fff}
#wpp-float-label{
  background:#111;color:#fff;
  padding:7px 14px;border-radius:100px;
  font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  white-space:nowrap;opacity:0;transform:translateX(-8px);
  transition:opacity .25s,transform .25s;pointer-events:none;
}
#wpp-float:hover #wpp-float-label{opacity:1;transform:translateX(0)}

/* ── BADGE ── */
.badge{
  position:absolute;top:10px;left:10px;
  background:#111;color:#fff;
  font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  padding:4px 9px;z-index:3;
}
.badge.destaque{background:#b8860b;color:#fff}
.badge.promocao{background:#c0392b;color:#fff}
</style>
</head>
<body>
<div id="banner">Fabricamos Sob Medida</div>
<div id="header">
  <div id="header-top">
    <div id="logo-wrap">
      <img id="logo-img" src="" alt="Logo">
      <span id="logo-txt">Madeiraria Safra</span>
    </div>
    <button id="search-btn" aria-label="Buscar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </div>
  <div id="search-bar"><div id="search-wrap">
    <input id="search" type="text" placeholder="Buscar produto..." autocomplete="off">
    <button id="clear-btn">&#215;</button>
    <div id="suggestions"></div>
  </div></div>
  <div id="filters"></div>
</div>
<div id="subcats"></div>
<div id="rbar"><span id="count"></span><select id="sort-sel"><option value="az">A &#8594; Z</option><option value="za">Z &#8594; A</option></select></div>
<div id="grid"></div>
<div id="empty"><p>Nenhum produto encontrado</p><button id="empty-reset">Ver todos</button></div>

<div id="wpp-float">
  <button id="wpp-float-btn" aria-label="Falar no WhatsApp">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>

<div id="cart-overlay">

<script>
// ════════════════════════════════
//  CONFIGURACAO DO CLIENTE
// ════════════════════════════════
var NOME_EMPRESA = "Madeireira Maia";
var WHATSAPP     = "5585998713726";
var LOGO_URL     = "";

// IDs dos produtos com badge "Mais vendido" (dourado)
var MAIS_VENDIDOS = [4, 3, 13, 17, 10];

// IDs dos produtos com badge "Promocao" (vermelho)
var PROMOCOES = [14, 15];
// ════════════════════════════════

var PRODUCTS = [{"id": 1, "nome": "Porta Parana", "cat": "Portas", "sub": "Semi Sólidas", "desc": "Porta de entrada da linha das semi sólidas.", "un": "un", "foto": "/fotos/porta-semi-solida-parana.jpg", "destaque": ""}, {"id": 2, "nome": "Porta Copaíba", "cat": "Portas", "sub": "Semi Sólidas", "desc": "Porta superior a paraná em preenchimento e resistencia.", "un": "un", "foto": "/fotos/porta-semi-solida-copaiba.jpg", "destaque": ""}, {"id": 3, "nome": "Porta  Naval", "cat": "Portas", "sub": "Semi Sólidas", "desc": "Aqui é o melhor custo benefício pois é resistente a umidade e já vem pronta para receber a tinta.", "un": "un", "foto": "/fotos/porta-semi-solida-naval.jpg", "destaque": "mais-vendido"}, {"id": 4, "nome": "Porta Londres", "cat": "Portas", "sub": "Sólidas", "desc": "Porta mais vendida dessa linha. Design premium e que melhor se adapta a qualquer ambiente.", "un": "mÂ²", "foto": "/fotos/porta-solida-londres.jpg", "destaque": ""}, {"id": 6, "nome": "Porta Tabicao", "cat": "Portas", "sub": "Sólidas", "desc": "Porta com tabuletas maiores que a veneziana. Facilita limpeza e ventila mais ainda.", "un": "mÂ²", "foto": "/fotos/porta-solida-tabicao.png", "destaque": "promocao"}, {"id": 11, "nome": "2 Frisos", "cat": "Concrem", "sub": "Personalizada", "desc": "Design moderno com 4 frisos horizontais. > Acabamento branco impecável e pronto para instalar. O detalhe linear que traz sofisticação e personalidade para qualquer ambiente interno.", "un": "un", "foto": "/fotos/Revestida 4 Frisos.jpg", "destaque": ""}, {"id": 14, "nome": "Colmeia com Almofada", "cat": "Portas", "sub": "Sólidas", "desc": "...", "un": "mÂ²", "foto": "/fotos/Colméia Trabalhada Reta c Almofada.jpg", "destaque": ""}];

var SUBCATS = {};
for(var i=0;i<PRODUCTS.length;i++){
  var p=PRODUCTS[i];
  if(!SUBCATS[p.cat]) SUBCATS[p.cat]=[];
  if(p.sub && SUBCATS[p.cat].indexOf(p.sub)===-1) SUBCATS[p.cat].push(p.sub);
}

var cat="Todos", sub="", busca="", srt="az", cart=[];

// Aplica config
document.getElementById("logo-txt").textContent = NOME_EMPRESA;
document.title = NOME_EMPRESA + " - Catalogo";
if(LOGO_URL){
  document.getElementById("logo-img").src = LOGO_URL;
  document.getElementById("logo-img").style.display = "block";
  document.getElementById("logo-txt").style.display = "none";
}

function buildFilters(){
  var cats=["Todos"];
  for(var i=0;i<PRODUCTS.length;i++){
    if(cats.indexOf(PRODUCTS[i].cat)===-1) cats.push(PRODUCTS[i].cat);
  }
  var wrap=document.getElementById("filters");
  var h="";
  for(var i=0;i<cats.length;i++){
    h+='<button class="chip'+(cats[i]==="Todos"?" active":"")+'" data-cat="'+cats[i]+'">'+cats[i]+'</button>';
  }
  wrap.innerHTML=h;
  wrap.querySelectorAll(".chip").forEach(function(b){
    b.addEventListener("click",function(){
      cat=b.dataset.cat; sub="";
      wrap.querySelectorAll(".chip").forEach(function(x){x.classList.remove("active");});
      b.classList.add("active");
      document.getElementById("search").value=""; busca="";
      document.getElementById("clear-btn").classList.remove("show");
      document.getElementById("suggestions").style.display="none";
      renderSubs(); render();
    });
  });
}

function isInCart(id){return cart.some(function(x){return x.id===id;});}
function addToCart(id){
  if(isInCart(id))return;
  var p=PRODUCTS.find(function(x){return x.id===id;});
  if(!p)return;
  cart.push(p); updateCartUI();
}
function removeFromCart(id){
  cart=cart.filter(function(x){return x.id!==id;});
  updateCartUI(); renderCartItems();
}
function updateCartUI(){
  var n=cart.length;
  document.getElementById("cart-count").textContent=n;
  document.getElementById("cart-fab").classList.toggle("show",n>0);
  document.querySelectorAll(".card-add").forEach(function(b){
    b.classList.toggle("added",isInCart(parseInt(b.dataset.id)));
  });
  var mid=document.getElementById("modal").dataset.pid;
  if(mid){
    var btn=document.getElementById("modal-add-cart");
    if(isInCart(parseInt(mid))){btn.textContent="Adicionado ao pedido";btn.classList.add("added");}
    else{btn.textContent="+ Adicionar ao pedido";btn.classList.remove("added");}
  }
}
function renderCartItems(){
  var el=document.getElementById("cart-items");
  if(!cart.length){el.innerHTML='<div id="cart-empty-msg">Nenhum item adicionado</div>';return;}
  var h="";
  for(var i=0;i<cart.length;i++){
    var p=cart[i];
    h+='<div class="cart-item">';
    h+='<img class="cart-item-img" src="'+p.foto+'" alt="'+p.nome+'">';
    h+='<div class="cart-item-info">';
    h+='<div class="cart-item-cat">'+p.cat+(p.sub?" - "+p.sub:"")+'</div>';
    h+='<div class="cart-item-name">'+p.nome+'</div>';
    h+='</div>';
    h+='<button class="cart-item-remove" data-id="'+p.id+'">&#215;</button>';
    h+='</div>';
  }
  el.innerHTML=h;
  el.querySelectorAll(".cart-item-remove").forEach(function(b){
    b.addEventListener("click",function(){removeFromCart(parseInt(b.dataset.id));});
  });
}
function sendCartWpp(){
  if(!cart.length)return;
  var msg="Ola!+Gostaria+de+solicitar+orcamento+dos+seguintes+itens:%0A%0A";
  for(var i=0;i<cart.length;i++){
    msg+=(i+1)+". "+cart[i].cat+" - "+cart[i].nome;
    if(i<cart.length-1)msg+="%0A";
  }
  msg+="%0A%0AAguardo+retorno,+obrigado!";
  window.open("https://wa.me/"+WHATSAPP+"?text="+msg,"_blank");
}
function filtered(){
  var r=PRODUCTS.filter(function(p){
    return(cat==="Todos"||p.cat===cat)&&(!sub||p.sub===sub)&&(!busca||p.nome.toLowerCase().indexOf(busca.toLowerCase())!==-1);
  });
  if(srt==="az")r.sort(function(a,b){return a.nome.localeCompare(b.nome);});
  else r.sort(function(a,b){return b.nome.localeCompare(a.nome);});
  return r;
}
function renderSubs(){
  var el=document.getElementById("subcats");
  var s=SUBCATS[cat]||[];
  if(!s.length){el.style.display="none";return;}
  el.style.display="flex";
  var h="";
  for(var i=0;i<s.length;i++){
    h+='<button class="sub-chip'+(sub===s[i]?" active":"")+'" data-s="'+s[i]+'">'+s[i]+'</button>';
  }
  el.innerHTML=h;
  el.querySelectorAll(".sub-chip").forEach(function(b){
    b.addEventListener("click",function(){sub=sub===b.dataset.s?"":b.dataset.s;renderSubs();render();});
  });
}
function render(){
  var r=filtered();
  var grid=document.getElementById("grid");
  var empty=document.getElementById("empty");
  document.getElementById("count").textContent=r.length+(r.length!==1?" produtos":" produto");
  if(!r.length){grid.innerHTML="";empty.style.display="block";return;}
  empty.style.display="none";
  var h="";
  for(var i=0;i<r.length;i++){
    var p=r[i]; var added=isInCart(p.id);
    h+='<div class="card" data-id="'+p.id+'">';
    if(MAIS_VENDIDOS.indexOf(p.id)!==-1) h+='<div class="badge destaque">Mais vendido</div>';
    else if(PROMOCOES.indexOf(p.id)!==-1) h+='<div class="badge promocao">Promocao</div>';
    h+='<div class="card-img-wrap"><img class="card-img" src="'+p.foto+'" alt="'+p.nome+'" loading="lazy"></div>';
    h+='<button class="card-add'+(added?" added":"")+'" data-id="'+p.id+'">';
    h+='<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
    h+='</button>';
    h+='<div class="card-info"><div class="card-sub-label">'+(p.sub||p.cat)+'</div><div class="card-title">'+p.nome+'</div></div>';
    h+='</div>';
  }
  grid.innerHTML=h;
  grid.querySelectorAll(".card").forEach(function(c){
    c.addEventListener("click",function(){openModal(parseInt(c.dataset.id));});
    c.querySelector(".card-add").addEventListener("click",function(e){e.stopPropagation();addToCart(parseInt(c.dataset.id));});
  });
  requestAnimationFrame(function(){
    var cards=document.querySelectorAll(".card");
    for(var i=0;i<cards.length;i++){
      (function(card,delay){setTimeout(function(){card.classList.add("visible");},delay);})(cards[i],i*50);
    }
  });
}
function suggest(v){
  var box=document.getElementById("suggestions");
  if(!v){box.style.display="none";return;}
  var m=PRODUCTS.filter(function(p){return p.nome.toLowerCase().indexOf(v.toLowerCase())!==-1;}).slice(0,6);
  if(!m.length){box.style.display="none";return;}
  var h="";
  for(var i=0;i<m.length;i++){
    var p=m[i];
    var re=new RegExp("("+v.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
    var hi=p.nome.replace(re,'<span class="sug-hi">$1</span>');
    h+='<div class="sug-item" data-nome="'+p.nome+'"><span>'+hi+'</span><span class="sug-cat">'+p.cat+'</span></div>';
  }
  box.innerHTML=h; box.style.display="block";
  box.querySelectorAll(".sug-item").forEach(function(item){
    item.addEventListener("click",function(){
      document.getElementById("search").value=item.dataset.nome;
      busca=item.dataset.nome;
      document.getElementById("clear-btn").classList.add("show");
      box.style.display="none"; render();
    });
  });
}
function openModal(id){
  var p=PRODUCTS.find(function(x){return x.id===id;}); if(!p)return;
  document.getElementById("modal").dataset.pid=id;
  document.getElementById("modal-cats").textContent=p.cat+(p.sub?" - "+p.sub:"");
  document.getElementById("modal-name").textContent=p.nome;
  document.getElementById("modal-img").src=p.foto;
  document.getElementById("modal-img").alt=p.nome;
  document.getElementById("modal-desc").textContent=p.desc;
  document.getElementById("modal-un").textContent="Unidade de venda: "+p.un;
  var msg="Ola!+Tenho+interesse+em:+"+encodeURIComponent(p.cat+" - "+p.nome);
  document.getElementById("modal-cta").href="https://wa.me/"+WHATSAPP+"?text="+msg;
  var btn=document.getElementById("modal-add-cart");
  if(isInCart(id)){btn.textContent="Adicionado ao pedido";btn.classList.add("added");}
  else{btn.textContent="+ Adicionar ao pedido";btn.classList.remove("added");}
  document.getElementById("overlay").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeModal(){document.getElementById("overlay").classList.remove("open");document.body.style.overflow="";}

document.getElementById("search-btn").addEventListener("click",function(){
  var b=document.getElementById("search-bar");b.classList.toggle("open");
  if(b.classList.contains("open"))document.getElementById("search").focus();
});
document.getElementById("search").addEventListener("input",function(e){
  busca=e.target.value;
  document.getElementById("clear-btn").classList.toggle("show",!!busca);
  suggest(busca); render();
});
document.getElementById("clear-btn").addEventListener("click",function(){
  document.getElementById("search").value=""; busca="";
  document.getElementById("clear-btn").classList.remove("show");
  document.getElementById("suggestions").style.display="none"; render();
});
document.addEventListener("click",function(e){
  if(!e.target.closest("#search-wrap"))document.getElementById("suggestions").style.display="none";
});
document.getElementById("sort-sel").addEventListener("change",function(e){srt=e.target.value;render();});
document.getElementById("overlay").addEventListener("click",function(e){if(e.target===document.getElementById("overlay"))closeModal();});
document.getElementById("modal-close").addEventListener("click",closeModal);
document.getElementById("modal-add-cart").addEventListener("click",function(){addToCart(parseInt(document.getElementById("modal").dataset.pid));});
document.getElementById("empty-reset").addEventListener("click",function(){
  cat="Todos"; sub=""; busca="";
  document.querySelectorAll(".chip").forEach(function(b){b.classList.remove("active");});
  var first=document.querySelector(".chip[data-cat='Todos']");
  if(first)first.classList.add("active");
  document.getElementById("search").value="";
  document.getElementById("clear-btn").classList.remove("show");
  renderSubs(); render();
});
document.getElementById("cart-btn").addEventListener("click",function(){
  renderCartItems();
  document.getElementById("cart-overlay").classList.add("open");
  document.body.style.overflow="hidden";
});
document.getElementById("cart-close").addEventListener("click",function(){
  document.getElementById("cart-overlay").classList.remove("open"); document.body.style.overflow="";
});
document.getElementById("cart-overlay").addEventListener("click",function(e){
  if(e.target===document.getElementById("cart-overlay")){
    document.getElementById("cart-overlay").classList.remove("open"); document.body.style.overflow="";
  }
});
document.getElementById("cart-wpp-btn").addEventListener("click",sendCartWpp);


document.getElementById("wpp-float-btn").addEventListener("click",function(){
  var msg="Ola!+Gostaria+de+mais+informacoes+sobre+os+produtos.";
  window.open("https://wa.me/"+WHATSAPP+"?text="+msg,"_blank");
});

buildFilters(); renderSubs(); render();
</script>
</body>
</html>
